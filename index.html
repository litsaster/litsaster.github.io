<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerology — Nhân số học</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='none'%3E%3Ccircle cx='16' cy='16' r='12' stroke='%23c9a227' stroke-width='1.5' stroke-dasharray='3 2'/%3E%3Cpath d='M16 8v16M8 16h16M10 10l12 12M22 10L10 22' stroke='%23c9a227' stroke-width='1.2' stroke-linecap='round' opacity='0.5'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23c9a227'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&family=Cinzel+Decorative:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/landing.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/print.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <!-- ========== LANDING ========== -->
    <div id="landing">
        <div class="landing-inner">
            <div class="landing-header">
                <div class="landing-icon">
                    <svg viewBox="0 0 32 32" fill="none" width="40" height="40">
                        <circle cx="16" cy="16" r="12" stroke="#c9a227" stroke-width="1.5" stroke-dasharray="3 2"/>
                        <path d="M16 8v16M8 16h16M10 10l12 12M22 10L10 22" stroke="#c9a227" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
                        <circle cx="16" cy="16" r="3" fill="#c9a227"/>
                    </svg>
                </div>
                <h1 class="landing-title">Numerology</h1>
                <p class="landing-subtitle">Giải mã con số vũ trụ ẩn chứa trong tên và ngày sinh của bạn</p>
            </div>
            <div class="landing-card">
                <div class="landing-card-glow"></div>
                <div class="landing-card-inner">
                    <div class="landing-form-header">
                        <h2>Nhập Thông Tin Của Bạn</h2>
                        <p>Vũ trụ đang lắng nghe...</p>
                    </div>
                    <div class="landing-row">
                        <div class="field">
                            <label>Họ</label>
                            <input type="text" id="landingLast" value="Vũ">
                        </div>
                        <div class="field">
                            <label>Tên đệm</label>
                            <input type="text" id="landingMiddle" value="Hạnh">
                        </div>
                        <div class="field">
                            <label>Tên</label>
                            <input type="text" id="landingFirst" value="Trâm An">
                        </div>
                    </div>
                    <div class="landing-row">
                        <div class="field">
                            <label>Ngày sinh</label>
                            <input type="date" id="landingDob" value="1997-05-29">
                        </div>
                        <div class="field">
                            <label>Giới tính</label>
                            <select id="landingGender">
                                <option value="Nam">Nam</option>
                                <option value="Nữ" selected>Nữ</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>
                    </div>
                    <button class="landing-btn" id="landingBtn" disabled>Giải Mã Vận Mệnh</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== RESULTS ========== -->
    <div id="app">
        <div class="top-actions no-print">
            <button class="action-btn" id="backToLandingBtn">← Quay lại</button>
            <button class="action-btn" id="exportPdfBtn">Xuất PDF</button>
        </div>
        <main class="main-content">
            <div class="cards-grid">
                <div class="cards-sidebar" id="cardsSidebar"></div>
                <div class="card-detail" id="cardDetail">
                    <div class="glow" id="detailGlow"></div>
                    <div class="card-detail-content" id="detailContent"></div>
                </div>
            </div>

            <div class="profile-container" id="profileContainer">
                <div class="profile" id="profileContent">
                    <div class="loading">⏳ Đang tải dữ liệu chi tiết...</div>
                </div>
            </div>
        </main>
    </div>

    <div id="numDetailModal" class="modal-overlay no-print" style="display:none;">
        <div class="modal-content" style="max-width:520px;">
            <div class="modal-header">
                <span class="modal-title" id="numDetailTitle">Chi tiết</span>
                <button class="modal-close" id="numDetailClose">&times;</button>
            </div>
            <div class="modal-body" id="numDetailBody"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/numerology.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/data.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
